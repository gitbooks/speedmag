<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #F2F2F7; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 48px; }
  h2 { font-size: 13px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 24px; }
  .row { display: flex; gap: 40px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 52px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .label { font-size: 11px; color: #9ca3af; }
  .sidebar-mock {
    display: flex; align-items: center; gap: 10px;
    background: #1C1C1E; padding: 12px 16px; border-radius: 10px;
  }
</style>
</head>
<body>

<h2>SpeedMag — M16 Magazine Icon</h2>

<div class="row">

  <!-- 128px -->
  <div class="item">
    <svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="128" height="128" rx="28" fill="#1C1C1E"/>
      <!-- M16 STANAG magazine silhouette -->
      <!-- Body: straight top, gently curved sides tapering down, curved base -->
      <path d="
        M47 22 H81
        Q84 22 84 25
        L84 30
        Q84 32 86 32
        L88 32
        Q90 32 90 34
        L90 88
        Q90 102 78 106
        L64 110
        L50 106
        Q38 102 38 88
        L38 34
        Q38 32 40 32
        L42 32
        Q44 32 44 30
        L44 25
        Q44 22 47 22Z
      " fill="white"/>
      <!-- Feed lips detail at top -->
      <rect x="50" y="22" width="28" height="4" rx="1" fill="#1C1C1E"/>
      <!-- Spine rib down center -->
      <line x1="64" y1="36" x2="64" y2="98" stroke="#1C1C1E" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
      <!-- Horizontal witness holes / ribs -->
      <line x1="50" y1="55" x2="78" y2="55" stroke="#1C1C1E" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>
      <line x1="50" y1="70" x2="78" y2="70" stroke="#1C1C1E" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>
      <line x1="50" y1="85" x2="76" y2="85" stroke="#1C1C1E" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>
    </svg>
    <span class="label">128px</span>
  </div>

  <!-- 64px -->
  <div class="item">
    <svg width="64" height="64" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="128" height="128" rx="28" fill="#1C1C1E"/>
      <path d="
        M47 22 H81
        Q84 22 84 25
        L84 30
        Q84 32 86 32
        L88 32
        Q90 32 90 34
        L90 88
        Q90 102 78 106
        L64 110
        L50 106
        Q38 102 38 88
        L38 34
        Q38 32 40 32
        L42 32
        Q44 32 44 30
        L44 25
        Q44 22 47 22Z
      " fill="white"/>
      <rect x="50" y="22" width="28" height="4" rx="1" fill="#1C1C1E"/>
      <line x1="64" y1="36" x2="64" y2="98" stroke="#1C1C1E" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
      <line x1="50" y1="55" x2="78" y2="55" stroke="#1C1C1E" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>
      <line x1="50" y1="70" x2="78" y2="70" stroke="#1C1C1E" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>
      <line x1="50" y1="85" x2="76" y2="85" stroke="#1C1C1E" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>
    </svg>
    <span class="label">64px</span>
  </div>

  <!-- 32px -->
  <div class="item">
    <svg width="32" height="32" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="128" height="128" rx="28" fill="#1C1C1E"/>
      <path d="
        M47 22 H81
        Q84 22 84 25
        L84 30
        Q84 32 86 32
        L88 32
        Q90 32 90 34
        L90 88
        Q90 102 78 106
        L64 110
        L50 106
        Q38 102 38 88
        L38 34
        Q38 32 40 32
        L42 32
        Q44 32 44 30
        L44 25
        Q44 22 47 22Z
      " fill="white"/>
      <rect x="50" y="22" width="28" height="4" rx="1" fill="#1C1C1E"/>
      <line x1="64" y1="36" x2="64" y2="98" stroke="#1C1C1E" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
    </svg>
    <span class="label">32px</span>
  </div>

  <!-- Sidebar mock -->
  <div class="item">
    <div class="sidebar-mock">
      <svg width="28" height="28" viewBox="0 0 128 128" fill="none">
        <rect width="128" height="128" rx="28" fill="#1C1C1E"/>
        <path d="M47 22 H81 Q84 22 84 25 L84 30 Q84 32 86 32 L88 32 Q90 32 90 34 L90 88 Q90 102 78 106 L64 110 L50 106 Q38 102 38 88 L38 34 Q38 32 40 32 L42 32 Q44 32 44 30 L44 25 Q44 22 47 22Z" fill="white"/>
        <rect x="50" y="22" width="28" height="4" rx="1" fill="#1C1C1E"/>
        <line x1="64" y1="36" x2="64" y2="98" stroke="#1C1C1E" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
      </svg>
      <div>
        <div style="color:white;font-size:13px;font-weight:600;line-height:1.2">SpeedMag</div>
        <div style="color:rgba(255,255,255,0.4);font-size:10px;line-height:1.2">Financial Planner</div>
      </div>
    </div>
    <span class="label">Sidebar</span>
  </div>

</div>

<!-- ── Colour variants ── -->
<h2>Colour variants</h2>
<div class="row">

  <!-- Dark (default) -->
  <div class="item">
    <svg width="64" height="64" viewBox="0 0 128 128" fill="none">
      <rect width="128" height="128" rx="28" fill="#1C1C1E"/>
      <path d="M47 22 H81 Q84 22 84 25 L84 30 Q84 32 86 32 L88 32 Q90 32 90 34 L90 88 Q90 102 78 106 L64 110 L50 106 Q38 102 38 88 L38 34 Q38 32 40 32 L42 32 Q44 32 44 30 L44 25 Q44 22 47 22Z" fill="white"/>
      <rect x="50" y="22" width="28" height="4" rx="1" fill="#1C1C1E"/>
      <line x1="64" y1="36" x2="64" y2="98" stroke="#1C1C1E" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
      <line x1="50" y1="55" x2="78" y2="55" stroke="#1C1C1E" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>
      <line x1="50" y1="70" x2="78" y2="70" stroke="#1C1C1E" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>
    </svg>
    <span class="label">Charcoal</span>
  </div>

  <!-- OD Green -->
  <div class="item">
    <svg width="64" height="64" viewBox="0 0 128 128" fill="none">
      <rect width="128" height="128" rx="28" fill="#3A4A2F"/>
      <path d="M47 22 H81 Q84 22 84 25 L84 30 Q84 32 86 32 L88 32 Q90 32 90 34 L90 88 Q90 102 78 106 L64 110 L50 106 Q38 102 38 88 L38 34 Q38 32 40 32 L42 32 Q44 32 44 30 L44 25 Q44 22 47 22Z" fill="white"/>
      <rect x="50" y="22" width="28" height="4" rx="1" fill="#3A4A2F"/>
      <line x1="64" y1="36" x2="64" y2="98" stroke="#3A4A2F" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
      <line x1="50" y1="55" x2="78" y2="55" stroke="#3A4A2F" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
      <line x1="50" y1="70" x2="78" y2="70" stroke="#3A4A2F" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
    </svg>
    <span class="label">OD Green</span>
  </div>

  <!-- FDE / Tan -->
  <div class="item">
    <svg width="64" height="64" viewBox="0 0 128 128" fill="none">
      <rect width="128" height="128" rx="28" fill="#8B7355"/>
      <path d="M47 22 H81 Q84 22 84 25 L84 30 Q84 32 86 32 L88 32 Q90 32 90 34 L90 88 Q90 102 78 106 L64 110 L50 106 Q38 102 38 88 L38 34 Q38 32 40 32 L42 32 Q44 32 44 30 L44 25 Q44 22 47 22Z" fill="white"/>
      <rect x="50" y="22" width="28" height="4" rx="1" fill="#8B7355"/>
      <line x1="64" y1="36" x2="64" y2="98" stroke="#8B7355" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
      <line x1="50" y1="55" x2="78" y2="55" stroke="#8B7355" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
      <line x1="50" y1="70" x2="78" y2="70" stroke="#8B7355" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
    </svg>
    <span class="label">FDE / Tan</span>
  </div>

  <!-- Midnight Blue -->
  <div class="item">
    <svg width="64" height="64" viewBox="0 0 128 128" fill="none">
      <rect width="128" height="128" rx="28" fill="#0D1B2A"/>
      <path d="M47 22 H81 Q84 22 84 25 L84 30 Q84 32 86 32 L88 32 Q90 32 90 34 L90 88 Q90 102 78 106 L64 110 L50 106 Q38 102 38 88 L38 34 Q38 32 40 32 L42 32 Q44 32 44 30 L44 25 Q44 22 47 22Z" fill="#0A84FF"/>
      <rect x="50" y="22" width="28" height="4" rx="1" fill="#0D1B2A"/>
      <line x1="64" y1="36" x2="64" y2="98" stroke="#0D1B2A" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
      <line x1="50" y1="55" x2="78" y2="55" stroke="#0D1B2A" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
      <line x1="50" y1="70" x2="78" y2="70" stroke="#0D1B2A" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
    </svg>
    <span class="label">Midnight + Blue</span>
  </div>

</div>

</body>
</html>
